<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel — Eduterra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FFC675;
  --green: #4A7C59;
  --ink: #23331F;
  --ink-soft: #23331F99;
  --ink-faint: #23331F55;
  --paper: #FBF3E7;
  --paper-raised: #FFFFFF;
  --amber: #E8A33D;
  --line: #23331F18;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; line-height: 1.65; }
.display { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
.mono { font-family: 'IBM Plex Mono', monospace; }
a { color: inherit; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 0 28px; }
.wrap-narrow { max-width: 760px; margin: 0 auto; padding: 0 28px; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 28px 0; }
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-mark { width: 36px; height: 36px; flex-shrink: 0; }
.nav-logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: -0.01em; color: var(--ink); }
.nav-links { display: flex; align-items: center; gap: 30px; font-size: 15px; font-weight: 500; }
.nav-links a { text-decoration: none; position: relative; }
.nav-links a::after { content: ""; position: absolute; left: 0; bottom: -4px; width: 0; height: 2px; background: var(--orange); transition: width 0.2s ease; }
.nav-links a:hover::after { width: 100%; }
.nav-links a:hover { color: var(--green); }

.back-link { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--green); text-decoration: none; margin-bottom: 20px; }
.back-link:hover { text-decoration: underline; }

.article-head { padding: 20px 0 10px; opacity: 0; transform: translateY(14px); animation: fadeUp 0.6s ease forwards; }
.tag { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; width: fit-content; }
.tag .dot { width: 6px; height: 6px; border-radius: 999px; }
.article-head h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; line-height: 1.22; letter-spacing: -0.015em; margin: 18px 0 22px; }
.article-meta { display: flex; gap: 18px; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink-faint); padding-bottom: 26px; border-bottom: 1px solid var(--line); margin-bottom: 30px; }

@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

.article-content { font-size: 17.5px; line-height: 1.8; color: var(--ink); opacity: 0; animation: fadeUp 0.6s ease forwards 0.15s; }
.article-content p { margin-bottom: 22px; }
.article-content p:first-of-type::first-letter {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 52px;
  font-weight: 700;
  float: left;
  line-height: 0.85;
  margin: 6px 8px 0 0;
  color: var(--orange);
}

.divider { width: 100%; height: 46px; display: block; margin: 40px 0; overflow: visible; }
.divider path.vine { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: drawVine 1.4s ease forwards 0.3s; }
.divider circle.leaf-node { fill: var(--orange); opacity: 0; transform-origin: center; animation: nodeIn 0.4s ease forwards; }
.divider circle.leaf-node:nth-of-type(1) { animation-delay: 0.9s; }
.divider circle.leaf-node:nth-of-type(2) { animation-delay: 1.15s; }
@keyframes drawVine { to { stroke-dashoffset: 0; } }
@keyframes nodeIn { to { opacity: 1; } }

.related-head { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); font-weight: 600; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; padding-bottom: 60px; }
.card {
  background: var(--paper-raised);
  border-radius: 16px;
  border: 1px solid var(--line);
  overflow: hidden;
  text-decoration: none;
  color: var(--ink);
  display: flex;
  flex-direction: column;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px -16px #23331F33; border-color: var(--orange); }
.card-thumb { height: 120px; display: flex; align-items: center; justify-content: center; }
.card-thumb svg { width: 48px; height: 48px; transition: transform 0.35s ease; }
.card:hover .card-thumb svg { transform: scale(1.12) rotate(-4deg); }
.card-body { padding: 18px 18px 20px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.card h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; line-height: 1.35; letter-spacing: -0.01em; }
.card p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; flex: 1; }
.card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--ink-faint); display: flex; gap: 10px; padding-top: 6px; border-top: 1px solid var(--line); }

.not-found { padding: 80px 0; text-align: center; }
.not-found h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; margin-bottom: 14px; }
.not-found a { color: var(--green); font-weight: 600; text-decoration: none; }

footer { border-top: 1px solid var(--line); padding: 32px 0 40px; margin-top: 20px; }
.footer-inner { display: flex; align-items: center; justify-content: space-between; font-size: 13.5px; color: var(--ink-faint); }
.footer-inner a { text-decoration: none; color: var(--green); font-weight: 600; }

@media (max-width: 860px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .nav-links { display: none; }
  .article-head h1 { font-size: 30px; }
}
@media (max-width: 560px) {
  .grid { grid-template-columns: 1fr; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
  .article-head, .article-content { opacity: 1; transform: none; }
  .divider path.vine { stroke-dashoffset: 0; }
  .divider circle.leaf-node { opacity: 1; }
}
</style>
</head>
<body>

<div class="wrap">
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <svg class="nav-logo-mark" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="18" fill="var(--green)"/>
        <path d="M18 26 C18 26 18 15 18 12" stroke="var(--paper)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        <path d="M18 16 C14 16 12 12 12 9 C16 9 18 12 18 16Z" fill="var(--orange)"/>
        <path d="M18 19 C22 19 24 15 24 12 C20 12 18 15 18 19Z" fill="var(--orange)"/>
      </svg>
      <span class="nav-logo-text">eduterra</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="artikel.html">Artikel</a>
    </div>
  </nav>
</div>

<div id="content"></div>

<footer>
  <div class="wrap footer-inner">
    <span>&copy; 2026 Eduterra</span>
    <a href="artikel.html">Baca artikel lain &rarr;</a>
  </div>
</footer>

<script src="articles-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'), 10);
  const article = ARTICLES.find(a => a.id === id);
  const contentEl = document.getElementById('content');

  if (!article) {
    contentEl.innerHTML = `
      <div class="wrap">
        <div class="not-found">
          <h1 class="display">Artikel nggak ketemu</h1>
          <p style="color:var(--ink-soft); margin-bottom:20px;">Mungkin link-nya salah atau artikelnya udah dipindah.</p>
          <a href="artikel.html">&larr; Balik ke semua artikel</a>
        </div>
      </div>`;
  } else {
    document.title = article.title + " — Eduterra";
    const color = CATEGORY_COLORS[article.category];
    const label = CATEGORY_LABELS[article.category];

    const related = ARTICLES.filter(a => a.id !== article.id && a.category === article.category).slice(0, 3);
    const relatedFallback = related.length > 0 ? related : ARTICLES.filter(a => a.id !== article.id).slice(0, 3);

    contentEl.innerHTML = `
      <div class="wrap-narrow">
        <a class="back-link" href="artikel.html">&larr; Semua artikel</a>
        <section class="article-head">
          <span class="tag mono" style="color:${color};"><span class="dot" style="background:${color};"></span>${label}</span>
          <h1 class="display">${article.title}</h1>
          <div class="article-meta">
            <span>${article.author}</span>
            <span>&middot;</span>
            <span>${article.date}</span>
            <span>&middot;</span>
            <span>${article.readTime} baca</span>
          </div>
        </section>
        <div class="article-content">
          ${article.content.map(p => `<p>${p}</p>`).join('')}
        </div>
      </div>

      <svg class="divider" viewBox="0 0 1100 46" preserveAspectRatio="none">
        <path class="vine" d="M0 24 C 260 24, 280 8, 500 22 S 740 40, 960 22 S 1080 8, 1100 22" stroke="${color}"></path>
        <circle class="leaf-node" cx="500" cy="22" r="6" style="fill:${color};"></circle>
        <circle class="leaf-node" cx="960" cy="22" r="6" style="fill:${color};"></circle>
      </svg>

      <div class="wrap">
        <div class="related-head">Baca juga</div>
        <div class="grid">${relatedFallback.map(cardHTML).join('')}</div>
      </div>
    `;
  }
</script>

</body>
</html>
